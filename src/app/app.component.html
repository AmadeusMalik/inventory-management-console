<p-toast></p-toast>
<div class="card p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2>Merchant Console</h2>
    <p-button label="Add New Product" icon="pi pi-plus" (onClick)="showDialog()"></p-button>
  </div>

  <div class="card mb-2">
    <h3> Inventory Analytics (Full Portfolio)</h3>
    <div class="chart-container " style="position: relative; height: 700px; width: 100%; overflow-y: auto;">
      <p-chart type="bar" [data]="chartData" [options]="chartOptions"></p-chart>
    </div>
  </div>

  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">

    <div style="width: 350px; flex-shrink: 0;">
      <p-iconfield iconPosition="left">
        <p-inputicon class="pi pi-search"></p-inputicon>
        <input #searchValue pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
          placeholder="Search products..." style="width: 100%" />
      </p-iconfield>
    </div>

    <p-button label="Clear" icon="pi pi-filter-slash" [outlined]="true" severity="secondary"
      (onClick)="dt.reset(); searchValue.value = ''">
    </p-button>

  </div>

  <p-table #dt [value]="inventory" [paginator]="true" [rows]="10"
    [globalFilterFields]="['product_name', 'sku', 'sync_status','product_price']" styleClass="p-datatable-striped"
    [tableStyle]="{'width': '100%'}">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="product_name">Product <p-sortIcon field="product_name"></p-sortIcon></th>
        <th>SKU</th>
        <th pSortableColumn="price">Price <p-sortIcon field="price"></p-sortIcon></th>
        <th>Stock</th>
        <th>Sync Status</th>
        <th>Actions</th>

      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td><strong>{{ item.product_name }}</strong></td>
        <td><code>{{ item.sku }}</code></td>
        <td>{{ item.price | currency:'USD' }}</td>
        <td>
          <p-tag [value]="item.stock_level < 5 ? 'Warning' : 'In Stock'"
            [severity]="item.stock_level < 5 ? 'danger' : 'success'">
          </p-tag>
        </td>
        <td>
          <p-tag [value]="item.sync_status" [severity]="item.sync_status === 'Success' ? 'success' : 'warn'">
          </p-tag>
        </td>

        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-refresh" tooltipPosition="left" pTooltip="Sync Product" severity="secondary"
              [rounded]="true" (onClick)="syncItem(item)"></p-button>
            <p-button pTooltip="Delete Product" tooltipPosition="right" icon="pi pi-trash" severity="danger"
              [rounded]="true" (onClick)="deleteItem(item.id)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>
<!-- Here for the popup dialog to add new product -->
<p-dialog header="New Inventory Item" [(visible)]="displayDialog" [style]="{width: '400px'}" [modal]="true"
  [draggable]="false" [resizable]="false">
  <div class="flex flex-column gap-4 py-2">
    <div class="flex flex-column gap-1">
      <label for="pname" class="text-sm font-semibold text-600">Product Name </label>
      <input id="pname" pInputText [(ngModel)]="newProduct.product_name" autocomplete="off" />
    </div>

    <div class="flex flex-row gap-3">
      <div class="flex flex-column gap- flex-1">
        <label for="sku" class="text-sm font-semibold text-600">SKU </label>
        <input id="sku" pInputText [(ngModel)]="newProduct.sku" />
      </div>
      <div class="flex flex-column gap-1 flex-1">
        <label for="price" class="text-sm font-semibold text-600">Price ($) </label>
        <p-inputNumber id="price" [(ngModel)]="newProduct.price" mode="currency" currency="USD" locale="en-US" />
      </div>
    </div>
    <div class="flex flex-column gap-1">
      <label for="stock" class="text-sm font-semibold text-600">Initial Stock Level</label>
      <p-inputNumber id="stock" [(ngModel)]="newProduct.stock_level" [showButtons]="true" [min]="0" />
    </div>

    <p-button label="Save Product" icon="pi pi-check" class="w-full" (onClick)="addProduct()"
      [disabled]="!newProduct.product_name || !newProduct.sku">
    </p-button>
  </div>
</p-dialog>
